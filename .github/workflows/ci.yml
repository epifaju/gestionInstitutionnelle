name: CI

on:
  push:
    branches: ["**"]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend (Maven + tests)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Run tests
        run: mvn -B test

  frontend:
    name: Frontend (Node + build)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

  docker-build:
    name: Docker build (smoke)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build backend image
        run: docker build -t gestion-backend:ci ./backend

      - name: Build frontend image
        run: docker build -t gestion-frontend:ci ./frontend

      - name: Trivy scan (repo filesystem)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          scan-type: fs
          scanners: vuln,secret,config
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: "1"

      - name: Trivy scan (backend image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: gestion-backend:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: "1"

      - name: Trivy scan (frontend image)
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: gestion-frontend:ci
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          format: table
          exit-code: "1"
