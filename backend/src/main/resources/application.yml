spring:
  application:
    name: gestion-institutionnelle
  messages:
    basename: messages/messages
    encoding: UTF-8
  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:gestion}
    username: ${DB_USER:gestion}
    password: ${DB_PASSWORD:gestion}
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration
  servlet:
    multipart:
      # GED supports larger files; keep a small buffer above 50MB.
      max-file-size: 55MB
      max-request-size: 60MB
  cache:
    type: caffeine
    caffeine:
      spec: maximumSize=500,expireAfterWrite=4h

server:
  port: 8080

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  metrics:
    tags:
      application: ${spring.application.name}
  endpoint:
    health:
      show-details: never
      probes:
        enabled: true

app:
  jwt:
    private-key-b64: ${JWT_PRIVATE_KEY_B64}
    public-key-b64: ${JWT_PUBLIC_KEY_B64}
    access-token-minutes: ${JWT_ACCESS_MINUTES:15}
    refresh-token-days: ${JWT_REFRESH_DAYS:7}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    region: ${MINIO_REGION:us-east-1}
    public-endpoint: ${MINIO_PUBLIC_ENDPOINT:}
    access-key: ${MINIO_ACCESS_KEY:minio}
    secret-key: ${MINIO_SECRET_KEY:minio123}
    bucket: ${MINIO_BUCKET:gestion}
  cors:
    allowed-origins: ${FRONTEND_URL:http://localhost:3000}
  security:
    refresh-cookie-secure: ${REFRESH_COOKIE_SECURE:false}
    auth-rate-limit-max: ${AUTH_RATE_LIMIT_MAX:30}
    auth-rate-limit-window-seconds: ${AUTH_RATE_LIMIT_WINDOW_SECONDS:60}
  ged:
    max-file-bytes: ${GED_MAX_FILE_BYTES:52428800} # 50 MiB
    presign-expiry-seconds: ${GED_PRESIGN_EXPIRY_SECONDS:3600} # 1h
    allowed-mime-types: ${GED_ALLOWED_MIME_TYPES:application/pdf,image/png,image/jpeg,image/webp,application/vnd.openxmlformats-officedocument.wordprocessingml.document,application/vnd.openxmlformats-officedocument.spreadsheetml.sheet}

---
spring:
  config:
    activate:
      on-profile: prod
  jpa:
    show-sql: false

app:
  error:
    expose-stack-trace: false

management:
  endpoints:
    web:
      exposure:
        include: health,info
